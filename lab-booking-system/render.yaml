services:
  # Backend Service
  - type: web
    name: lab-booking-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
    healthCheck:
      path: /health
      timeout: 10000
      interval: 30000
    autoDeploy: true
    
  # Frontend Service
  - type: web
    name: lab-booking-frontend
    env: static
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://lab-booking-backend.onrender.com
    healthCheck:
      path: /
      timeout: 10000
      interval: 30000
    autoDeploy: true

# Databases (if needed)
databases:
  - name: lab-booking-db
    plan: free
